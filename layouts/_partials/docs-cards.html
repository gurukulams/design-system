<div class="container my-4">
    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
        {{ range .Sections }}
        <div class="col">
            <div class="card h-100 shadow-sm border-0 bg-light">
                <div class="card-header bg-white border-bottom-0 pt-4">
                    <h5 class="card-title fw-bold mb-0 text-primary">
                        <i class="bi bi-journal-text me-2"></i>
                        {{ partial "utils/title" . }}
                    </h5>
                </div>
                
                <div class="card-body">
                    <p class="card-text text-muted small">
                        {{ if .Summary }}
                            {{ .Summary | truncate 120 }}
                        {{ else }}
                            Explore the contents and sub-sections of {{ .LinkTitle }}.
                        {{ end }}
                    </p>
                </div>
                
                <div class="card-footer bg-white border-top-0 pb-4 d-flex justify-content-end">
                    <a href="{{ .RelPermalink }}" class="btn btn-sm btn-outline-primary d-flex align-items-center">
                        Go to <i class="bi bi-chevron-double-right ms-2"></i>
                    </a>
                </div>
            </div>
        </div>
        {{ else }}
        <div class="col-12 text-center py-5">
            <p class="text-muted">No chapters found.</p>
        </div>
        {{ end }}
    </div>
</div>
