{{ if .TableOfContents }}

<aside id="document-article-toc" class="col-lg-3 d-none d-lg-block border-start bg-light-subtle">
    <div class="sticky-top py-5 ps-4" style="top: 80px;">
        <h6 class="text-uppercase fw-bold small text-muted mb-3">{{ partial "docs/text/i18n" "On this page" }}</h6>
        <nav id="TableOfContents" class="toc-nav">
            <nav id="TableOfContents">
                {{ .TableOfContents }}
            </nav>
        </nav>

        <div class="mt-4 pt-3 border-top border-secondary-subtle">
            <a href="{{ .Permalink }}#" class="btn btn-link btn-sm p-0 text-decoration-none text-muted d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-up-short" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M8 12a.5.5 0 0 0 .5-.5V5.707l2.146 2.147a.5.5 0 0 0 .708-.708l-3-3a.5.5 0 0 0-.708 0l-3 3a.5.5 0 1 0 .708.708L7.5 5.707V11.5a.5.5 0 0 0 .5.5"/>
                </svg>
                {{ partial "docs/text/i18n" "Back to top" }}
            </a>
        </div>
    </div>
</aside>

<style>
    /* Targeting Hugo's dynamic TOC structure */
    .toc-nav nav ul {
        list-style: none;
        padding-left: 0;
        margin-bottom: 0;
    }

    /* Top level links (e.g., Core Pillars) */
    .toc-nav nav ul li a {
        display: block;
        padding: 0.25rem 0;
        font-size: 0.875rem;
        color: #6c757d; /* text-muted */
        text-decoration: none;
        transition: color 0.2s ease-in-out;
    }

    /* Nested level links (e.g., Formatting & Structure) */
    .toc-nav nav ul li ul {
        padding-left: 1rem; /* Indentation for sub-items */
        border-left: 1px solid #dee2e6; /* Optional: subtle line for depth */
        margin-left: 0.25rem;
    }

    .toc-nav nav ul li a:hover,
    .toc-nav nav ul li a.active {
        color: var(--bs-primary) !important;
        font-weight: 600;
    }
</style>
{{ end }}
