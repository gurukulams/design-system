
<header class="navbar navbar-expand-lg navbar-light border-bottom sticky-top py-2 shadow-sm">

        <div class="d-flex align-items-center w-100">
            <button class="btn btn-link p-0 me-3" type="button" data-bs-toggle="offcanvas" href="#offcanvasDocsTree" role="button" aria-controls="offcanvasDocsTree">
                <i class="bi bi-list fs-3"></i>
            </button>
            <div>
                {{ partial "breadcrumb.html" . }}
                <h1 class="h5 mb-0 fw-bold">{{ partial "utils/title" . }}</h1>
            </div>
            

            <ul class="navbar-nav ms-auto d-flex flex-row justify-content-evenly justify-content-lg-end mt-lg-0 pb-lg-0">
             <li class="nav-item">
                {{ partial "utils/slide-finder.html" . }}
              </li>
              

              <li class="nav-item d-flex align-items-center position-relative px-1" id="colorPickerDropdownWrapper" style="padding-bottom: 6px;">
  
                <!-- 1. The Toggling Checkbox Button -->
                <input type="checkbox" class="btn-check" id="notes-pencil-toggle" autocomplete="off" />
                <label class="btn btn-outline-secondary btn-sm border-0" for="notes-pencil-toggle" style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                  <i class="bi bi-braces fs-5"></i>
                </label>  
              
                <!-- 2. The Dropdown Split Trigger (Arrow to pick line color) -->
                <button class="btn btn-outline-secondary btn-sm border-0 px-1 dropdown-toggle dropdown-toggle-split" 
                        type="button" 
                        id="colorPickerMenuButton" 
                        data-bs-toggle="dropdown" 
                        aria-expanded="false"
                        style="border-top-left-radius: 0; border-bottom-left-radius: 0; font-size: 0.75rem;">
                  <span class="visually-hidden">Toggle Dropdown</span>
                </button>
              
                <!-- 3. Dynamic Underline Indicator Node -->
                <div class="underline-indicator"></div>
              
                <!-- Predefined Color Palette Options Menu -->
                <ul class="dropdown-menu dropdown-menu-end shadow-sm p-2" 
                    aria-labelledby="colorPickerMenuButton" 
                    style="min-width: auto; width: max-content; margin-top: 5px !important;"
                    id="presetColorsList">
                  <li class="d-flex gap-2 px-1">
                    <div class="color-swatch active" data-color="#0d6efd" style="background-color: #0d6efd;" title="Primary"></div>
                    <div class="color-swatch" data-color="#6c757d" style="background-color: #6c757d;" title="Secondary"></div>
                    <div class="color-swatch" data-color="#198754" style="background-color: #198754;" title="Success"></div>
                    <div class="color-swatch" data-color="#0dcaf0" style="background-color: #0dcaf0;" title="Info"></div>
                    <div class="color-swatch" data-color="#ffc107" style="background-color: #ffc107;" title="Warning"></div>
                    <div class="color-swatch" data-color="#dc3545" style="background-color: #dc3545;" title="Danger"></div>
                  </li>
                </ul>
              
                <!-- Hidden input field proxy for your data engine -->
                <input type="hidden" id="noteLineCmb" value="#0d6efd">
              </li>
              
              {{ partial "docs/prev-next-docs.html" . }}
              </ul>

</header>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasDocsTree" aria-labelledby="offcanvasDocsTreeLabel">
    <div class="offcanvas-header border-bottom d-flex flex-column align-items-stretch">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="input-group">
          <span class="input-group-text border-end-0" id="search-icon">
              <i class="bi bi-search text-muted"></i>
          </span>
          

                <input id="book-search-input" 
                        class="form-control border-start-0 ps-0" 
                        aria-autocomplete="both" 
                        aria-labelledby="docsearch-label" 
                        autocomplete="off" 
                        autocorrect="off" 
                        autocapitalize="off" 
                        enterkeyhint="go" 
                        spellcheck="false" 
                        autofocus="true" 
                        placeholder="{{ partial "docs/text/i18n" "Search" }} {{ .Site.Title }}"
                        aria-label="{{ partial "docs/text/i18n" "Search" }}"
                        maxlength="64" 
                        type="search" 
                        
                        aria-activedescendant="docsearch-hits0-item-0" 
                        aria-controls="docsearch-hits0-list docsearch-hits1-list docsearch-hits2-list docsearch-hits3-list docsearch-hits4-list docsearch-hits5-list docsearch-hits6-list docsearch-hits7-list docsearch-hits8-list docsearch-hits9-list docsearch-hits10-list docsearch-hits11-list docsearch-hits12-list docsearch-hits13-list docsearch-hits14-list docsearch-hits15-list docsearch-hits16-list docsearch-hits17-list docsearch-hits18-list">      
      </div>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
  
      
  </div>
    <div class="offcanvas-body">
        <ul id="book-search-results"></ul>
      {{/* Grab the root docs folder */}}
    {{ with .Site.GetPage "section" "docs" }}
    {{ partial "docs/docs-tree.html" . }}
    {{ end }}
    </div>
  </div>
