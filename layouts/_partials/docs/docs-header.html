
<header class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-2 shadow-sm">
    <div class="container px-4">
        <div class="d-flex align-items-center">
            <button class="btn btn-link text-dark p-0 me-3" type="button" data-bs-toggle="offcanvas" href="#offcanvasExample">
                <i class="bi bi-list fs-3"></i>
            </button>
            
            <div class="d-none d-md-block">
                {{ partial "breadcrumb.html" . }}
                <h1 class="h6 mb-0 fw-bold text-dark">{{ partial "utils/title" . }}</h1>
            </div>
        </div>

        <div class="ms-auto d-flex align-items-center">
            {{ partial "utils/slide-finder.html" . }}
        </div>
    </div>
</header>


  
  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
    <div class="offcanvas-header border-bottom d-flex flex-column align-items-stretch">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0" id="search-icon">
              <i class="bi bi-search text-muted"></i>
          </span>
          

                <input id="book-search-input" 
                        class="form-control bg-light border-start-0 ps-0" 
                        aria-autocomplete="both" 
                        aria-labelledby="docsearch-label" 
                        autocomplete="off" 
                        autocorrect="off" 
                        autocapitalize="off" 
                        enterkeyhint="go" 
                        spellcheck="false" 
                        autofocus="true" 
                        placeholder="Search docs" 
                        maxlength="64" 
                        type="search" 
                        
                        aria-activedescendant="docsearch-hits0-item-0" 
                        aria-controls="docsearch-hits0-list docsearch-hits1-list docsearch-hits2-list docsearch-hits3-list docsearch-hits4-list docsearch-hits5-list docsearch-hits6-list docsearch-hits7-list docsearch-hits8-list docsearch-hits9-list docsearch-hits10-list docsearch-hits11-list docsearch-hits12-list docsearch-hits13-list docsearch-hits14-list docsearch-hits15-list docsearch-hits16-list docsearch-hits17-list docsearch-hits18-list">      
      </div>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
  
      
  </div>
    <div class="offcanvas-body">
        <ul id="book-search-results"></ul>
      {{/* Grab the root docs folder */}}
    {{ with .Site.GetPage "section" "docs" }}
    {{ partial "docs/docs-tree.html" . }}
    {{ else }}
        <p class="p-3 text-muted">No documentation found in /content/docs/</p>
    {{ end }}
    </div>
  </div>
