{{ $style := resources.Get "css/design-system.css" | minify | fingerprint }}

{{ if $style }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}" integrity="{{ $style.Data.Integrity }}" crossorigin="anonymous">
{{ end }}

<!-- Load Content Type Specific Style Sheets -->
{{ $partialPath := printf "stylesheets/stylesheets-%s" .Type }}

{{ if templates.Exists (printf "partials/%s.html" $partialPath) }}
  {{ partial $partialPath . }}
{{ end }}
