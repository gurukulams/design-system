
{{ if .IsPage }}
<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js/plugin/markdown/markdown.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        let deck = new Reveal(document.querySelector('.reveal'), {
            embedded: true,
            hash: true,
            // These settings ensure the slides "fit" the container
            width: 960,
            height: 700,
            margin: 0.1,
            minScale: 0.2,
            maxScale: 2.0,
            plugins: [ RevealMarkdown ]
        });
        deck.initialize();
    });

    function toggleFullScreen() {
        const elem = document.querySelector('.reveal-wrapper');
        const existingBtn = document.getElementById('dynamic-fullscreen-exit');
    
        // CASE 1: If the button exists, it means we are in full screen and want to EXIT
        if (existingBtn) {
            // Remove the button immediately
            existingBtn.remove();
    
            // Trigger exit full screen
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) { /* Safari */
                document.webkitExitFullscreen();
            }
        } 
        // CASE 2: We are entering full screen
        else {
            // 1. Create the floating button with the same icon
            const exitBtn = document.createElement('a');
            exitBtn.id = 'dynamic-fullscreen-exit';
            exitBtn.className = 'fullscreen-floating-btn';
            exitBtn.href = 'javascript://';
            exitBtn.innerHTML = '<i class="bi bi-fullscreen-exit"></i>';
            
            // 2. Attach this exact same function to the new button's click event
            exitBtn.onclick = toggleFullScreen;
            
            // 3. Append it to the element going full screen so it travels with it
            elem.appendChild(exitBtn);
    
            // 4. Trigger enter full screen
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            }
        }
    }
    
    /**
     * CRITICAL SAFETY NET FOR THE 'ESC' KEY:
     * If the user hits the physical 'Esc' key to leave full screen instead of 
     * clicking your button, we still need to clear the floating button out of the DOM.
     */
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            const existingBtn = document.getElementById('dynamic-fullscreen-exit');
            if (existingBtn) {
                existingBtn.remove();
            }
        }
    });
    // Safari variant
    document.addEventListener('webkitfullscreenchange', () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            const existingBtn = document.getElementById('dynamic-fullscreen-exit');
            if (existingBtn) { existingBtn.remove(); }
        }
    });


    function updateRevealTheme() {
        const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
        const themeLink = document.getElementById('theme');
        
        const darkTheme = "https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css";
        const lightTheme = "https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/white.css";
    
        const newHref = isDark ? darkTheme : lightTheme;
        
        if (themeLink.getAttribute('href') !== newHref) {
            themeLink.setAttribute('href', newHref);
        }
    }
    
    // Watch for Bootstrap Theme Changes
    const themeObserver = new MutationObserver(() => updateRevealTheme());
    themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-bs-theme'] });
    
    // Initial check on load
    updateRevealTheme();


</script>
{{ else }}
  {{/* This is a list/section page */}}
{{ end }}
