{{- $dest := .Destination | safeURL -}}
{{- $image := .Page.Resources.GetMatch (printf "*%s" $dest) -}}

<figure class="figure img-fluid {{ with .Title }}{{ . }}{{ end }}">

  {{- if $image -}}
    <!-- ✅ Page Resource (same folder as index.md) -->
    <img src="{{ $image.RelPermalink }}" alt="{{ .Text }}" class="w-100" loading="lazy"/>

  {{- else if and (ne .Page.Language.Lang "en") -}}
    <!-- 🌐 Try localized static path -->
    {{- $localized := printf "/%s/%s" .Page.Language.Lang $dest -}}
    <img src="{{ $localized | relURL }}" alt="{{ .Text }}" class="w-100" loading="lazy"/>

  {{- else -}}
    <!-- 📦 Fallback (static or external) -->
    <img src="{{ $dest | relURL }}" alt="{{ .Text }}" class="w-100" loading="lazy"/>

  {{- end }}

  {{ with .Text }}
  <figcaption class="figure-caption text-center">
    {{ . }}
  </figcaption>
  {{ end }}

</figure>
