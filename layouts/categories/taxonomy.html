{{ define "main" }}
<div class="container py-5">
    <div class="row">
        <div class="col-lg-10 mx-auto">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/">Home</a></li>
                    <li class="breadcrumb-item active">Categories</li>
                </ol>
            </nav>
            
            <div class="d-flex align-items-center mb-4">
                <div class="bg-primary text-white rounded-3 p-3 me-3">
                    <i class="bi bi-collection-fill fs-2"></i>
                </div>
                <div>
                    <h1 class="fw-bold mb-0">{{ .Title }}</h1>
                    <p class="text-muted">Exploring all subsystems and training under the <strong>{{ .Title }}</strong> category.</p>
                </div>
            </div>

            <hr class="my-5">

            <div class="row row-cols-1 row-cols-md-2 g-4">
                {{ range .Pages }}
                <div class="col">
                    <div class="card h-100 border-0 shadow-sm hover-lift">
                        <div class="card-body">
                            <h5 class="fw-bold">
                                <a href="{{ .RelPermalink }}" class="text-decoration-none text-dark stretched-link">
                                    {{ partial "utils/title" . }}
                                </a>
                            </h5>
                            <p class="text-muted small">{{ .Summary | truncate 150 }}</p>
                            <div class="d-flex align-items-center mt-3 text-primary small fw-bold">
                                Read More <i class="bi bi-arrow-right ms-2"></i>
                            </div>
                        </div>
                    </div>
                </div>
                {{ end }}
            </div>
        </div>
    </div>
</div>
{{ end }}
