{{ define "main" }}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            
            <div class="d-flex align-items-center mb-3">
                <nav aria-label="breadcrumb" class="me-auto">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item">
                            {{ $presentationsURL := "presentations/" | relLangURL }}
                            <a href="{{ $presentationsURL }}">{{ T "Presentations" | default "Presentations" }}</a>
                        </li>
                        <li class="breadcrumb-item active" aria-current="page">{{ .Title }}</li>
                    </ol>
                </nav>
                <button class="btn btn-sm btn-outline-dark" onclick="toggleFullScreen()">
                    <i class="bi bi-arrows-fullscreen"></i>
                </button>
            </div>

            <div class="reveal-wrapper shadow border rounded bg-white" 
                 style="height: 70vh; min-height: 500px; position: relative; overflow: hidden;">
                <div class="reveal">
                    <div class="slides">
                        <section data-markdown 
                                 data-separator="^\r?\n---\r?\n" 
                                 data-separator-vertical="^\r?\n--\r?\n">
                            <script type="text/template">
                                {{ .RawContent }}
                            </script>
                        </section>
                    </div>
                </div>
            </div>
            
            <div class="mt-3 text-muted small">
                <i class="bi bi-info-circle"></i> Use arrow keys or the icons above to navigate.
            </div>

        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/white.css" id="theme">

<style>
    /* Force Reveal to stay inside the 70vh box */
    .reveal-wrapper .reveal {
        width: 100%;
        height: 100%;
    }
    
    /* Adjust slide padding so content doesn't hit the navigation arrows */
    .reveal .slides section { 
        text-align: left; 
        padding: 20px;
    }

    /* Keep navigation controls clearly visible */
    .reveal .controls {
        bottom: 20px !important;
        right: 20px !important;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js/plugin/markdown/markdown.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        let deck = new Reveal(document.querySelector('.reveal'), {
            embedded: true,
            hash: true,
            // These settings ensure the slides "fit" the container
            width: 960,
            height: 700,
            margin: 0.1,
            minScale: 0.2,
            maxScale: 2.0,
            plugins: [ RevealMarkdown ]
        });
        deck.initialize();
    });

    function toggleFullScreen() {
        const elem = document.querySelector('.reveal-wrapper');
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari */
            elem.webkitRequestFullscreen();
        }
    }
</script>
{{ end }}
