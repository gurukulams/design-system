{{ define "main" }}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-12">
            
            <div class="d-flex align-items-center mb-3">
                <nav aria-label="breadcrumb" class="me-auto">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item">
                            {{ $presentationsURL := "presentations/" | relLangURL }}
                            <a href="{{ $presentationsURL }}">{{ T "Presentations" | default "Presentations" }}</a>
                        </li>
                        <li class="breadcrumb-item active" aria-current="page">{{ .Title }}</li>
                    </ol>
                </nav>
                
            </div>

            <div class="reveal-wrapper shadow border rounded bg-white" 
                 style="height: 70vh; min-height: 500px; position: relative; overflow: hidden;">
                <div class="reveal">
                    <div class="slides">
                        <section data-markdown 
                                 data-separator="^\r?\n---\r?\n" 
                                 data-separator-vertical="^\r?\n--\r?\n">
                            <script type="text/template">
                                {{ .RawContent }}
                            </script>
                        </section>
                    </div>
                </div>
            </div>
            
            <div class="mt-3 text-muted small">
                <i class="bi bi-info-circle"></i> Use arrow keys or the icons above to navigate.
            </div>

        </div>
    </div>
</div>




{{ end }}
