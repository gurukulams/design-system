{{ define "main" }}
<div class="container py-5">
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {{ range .RegularPages }}
        <div class="col">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body">
                    <div class="mb-2">
                        {{ range (.GetTerms "categories") }}
                        <a href="{{ .RelPermalink }}" class="badge bg-primary-subtle text-primary text-decoration-none border border-primary-subtle me-1">
                            {{ .LinkTitle }}
                        </a>
                        {{ end }}
                    </div>

                    <h5 class="card-title fw-bold">
                        <a href="{{ .RelPermalink }}" class="text-decoration-none text-dark">{{ partial "utils/title" . }}</a>
                    </h5>
                    
                    <p class="card-text text-muted small">{{ .Summary | truncate 80 }}</p>

                    <div class="mt-3">
                        {{ range (.GetTerms "tags") }}
                        <a href="{{ .RelPermalink }}" class="text-decoration-none small text-muted me-2">
                            #{{ .LinkTitle }}
                        </a>
                        {{ end }}
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0 pb-3">
                    <a href="{{ .RelPermalink }}" class="btn btn-sm btn-link p-0 text-primary fw-bold text-decoration-none">
                        Launch Slides <i class="bi bi-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
