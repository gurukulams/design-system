# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name = "Book"
license = "MIT"
licenselink = "https://github.com/gurukulams/design-system/blob/main/LICENSE"
description = "Hugo documentation theme as simple as plain book"
homepage = "https://github.com/gurukulams/design-system"
demosite = "https://design-system-demo.netlify.app"
tags = ["responsive", "clean", "documentation", "docs", "flexbox", "search", "mobile", "multilingual", "disqus"]
features = []
min_version = "0.146.0"

[author]
  name = "Alex Shpak"
  homepage = "https://github.com/gurukulams/"

[security]
enableInlineShortcodes = true
[security.funcs]
getenv = ['^HUGO_','CONTEXT','BUILD_PRODUCTION']